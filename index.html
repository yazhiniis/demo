<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Register</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>

    <div class="container">
         <div class="section">
            <div class="wrapper">
                <h2>Register</h2>
                <p class="sub">Lorem ipsum dolor sit amet elit. Sapiente sit aut eos consectetur adipisicing.</p>
                
                <form>
                    <div class="row">
                        <div class="group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" placeholder="e.g. John" required>
                        </div>
                        <div class="group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" placeholder="e.g. Smith" required>
                        </div>
                    </div>

                    <div class="group full-width">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="e.g. john@your-domain.com" required>
                    </div>

                    <div class="row">
                        <div class="group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" placeholder="+00 0000 000 0000">
                        </div>
                        <div class="group">
                            <label for="website">Website</label>
                            <input type="url" id="website" placeholder="e.g. https://google.com">
                        </div>
                    </div>

                    <div class="row">
                        <div class="group">
                            <label for="password">Password</label>
                            <input type="password" id="password" placeholder="Your Password" required>
                        </div>
                        <div class="group">
                            <label for="re-password">Re-type Password</label>
                            <input type="password" id="re-password" placeholder="Your Password" required>
                        </div>
                    </div>

                    <div class="checkbox">
                        <input type="checkbox" id="terms" checked required>
                        <label for="terms">Creating an account means you're okay with our <a href="#">Terms and Conditions</a> and our <a href="#">Privacy Policy</a>.</label>
                    </div>

                    <button type="submit" class="register">Register</button>
                </form>
            </div>
        </div>

        <div class="image-section"></div>
    </div>

</body>
</html>
